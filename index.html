<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 21 MARZO - FLORES VISIBLES 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
            background: #0a0a2a;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&display=swap');

        /* Canvas siempre detrás */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay con textos SUPER PEQUEÑOS Y TRANSPARENTES */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Header mini */
        #header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.2);
            white-space: nowrap;
        }

        #header h1 {
            font-size: 1.2rem;
            color: rgba(255,215,0,0.7);
            font-family: 'Dancing Script', cursive;
            margin: 0;
            line-height: 1;
        }

        #header p {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin: 2px 0 0;
            letter-spacing: 1px;
        }

        /* Mensaje principal - pequeño y semi-transparente */
        #message-container {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(2px);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.15);
            text-align: center;
            max-width: 90%;
        }

        #message-title {
            font-size: 0.9rem;
            color: rgba(255,215,0,0.6);
            font-family: 'Dancing Script', cursive;
            margin: 0;
            line-height: 1.2;
        }

        #message-text {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            font-style: italic;
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #auto-message {
            font-size: 0.7rem;
            color: rgba(255,215,0,0.4);
            margin: 0;
        }

        /* Countdown pequeño abajo */
        #countdown-container {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(2px);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.15);
            font-size: 0.8rem;
            color: rgba(255,215,0,0.5);
            font-family: monospace;
            white-space: nowrap;
        }

        #countdown {
            color: rgba(255,215,0,0.7);
        }

        /* Ajustes para móvil */
        @media (max-width: 600px) {
            #header h1 { font-size: 1rem; }
            #header p { font-size: 0.6rem; }
            #message-title { font-size: 0.8rem; }
            #message-text { font-size: 0.7rem; }
            #countdown-container { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <!-- Textos SUPER DISCRETOS -->
    <div id="overlay">
        <div id="header">
            <h1>21 de Marzo</h1>
            <p>✨✨✨</p>
        </div>

        <div id="message-container">
            <div id="message-title">Mi amor</div>
            <div id="message-text">"Eres la flor más hermosa"</div>
            <div id="auto-message">💛</div>
        </div>

        <div id="countdown-container">
            <span id="countdown"></span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <!-- Importar Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- CONFIGURACIÓN ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        
        // Cámara más cercana para ver detalles
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 5, 15);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = false; // Sin sombras para más rendimiento

        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2.2;

        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        // Luces de colores (más brillantes)
        const pointLights = [];
        for (let i = 0; i < 8; i++) {
            const light = new THREE.PointLight(0xffaa00, 1.2, 15);
            scene.add(light);
            pointLights.push(light);
        }

        // --- SUELO CON TEXTURA ---
        const groundGeometry = new THREE.CircleGeometry(15, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x1a4d1a });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.3;
        scene.add(ground);

        // --- FLORES MÁS GRANDES Y VISIBLES ---
        function crearFlorGrande(posX, posZ, colorIndex) {
            const grupo = new THREE.Group();
            
            // Tallo
            const talloGeo = new THREE.CylinderGeometry(0.15, 0.2, 3, 6);
            const talloMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 });
            const tallo = new THREE.Mesh(talloGeo, talloMat);
            tallo.position.y = 1.3;
            grupo.add(tallo);

            // Centro grande y brillante
            const centroGeo = new THREE.SphereGeometry(0.7, 10);
            const centroMat = new THREE.MeshStandardMaterial({ 
                color: 0x8b4513,
                emissive: new THREE.Color(0x4a2a0a)
            });
            const centro = new THREE.Mesh(centroGeo, centroMat);
            centro.position.y = 2.7;
            grupo.add(centro);

            // Pétalos grandes
            const numPetalos = 8;
            for (let i = 0; i < numPetalos; i++) {
                const angulo = (i / numPetalos) * Math.PI * 2;
                const petaloGeo = new THREE.ConeGeometry(0.9, 0.3, 8);
                const petaloMat = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(0.12 + colorIndex * 0.1, 1, 0.65),
                    emissive: new THREE.Color().setHSL(0.12 + colorIndex * 0.1, 0.3, 0.1)
                });
                const petalo = new THREE.Mesh(petaloGeo, petaloMat);
                
                petalo.position.x = Math.cos(angulo) * 1.2;
                petalo.position.z = Math.sin(angulo) * 1.2;
                petalo.position.y = 2.7;
                petalo.rotation.y = angulo;
                petalo.rotation.x = 0.4;
                grupo.add(petalo);
            }

            grupo.position.set(posX, 0, posZ);
            return grupo;
        }

        // Crear muchas flores en todo el espacio
        const flores = [];
        
        // Círculo central
        for (let i = 0; i < 12; i++) {
            const angulo = (i / 12) * Math.PI * 2;
            const radio = 4;
            const x = Math.cos(angulo) * radio;
            const z = Math.sin(angulo) * radio;
            const flor = crearFlorGrande(x, z, i / 12);
            scene.add(flor);
            flores.push(flor);
            
            if (i < pointLights.length) {
                pointLights[i].position.set(x, 3, z);
            }
        }
        
        // Flores alrededor
        for (let i = 0; i < 20; i++) {
            const angulo = Math.random() * Math.PI * 2;
            const radio = 5 + Math.random() * 5;
            const x = Math.cos(angulo) * radio;
            const z = Math.sin(angulo) * radio;
            const flor = crearFlorGrande(x, z, Math.random());
            scene.add(flor);
            flores.push(flor);
        }

        // --- MARIPOSAS VISIBLES ---
        function crearMariposaVisible(posX, posY, posZ) {
            const grupo = new THREE.Group();
            
            const cuerpoGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 5);
            const cuerpoMat = new THREE.MeshStandardMaterial({ color: 0x2b1e0e });
            const cuerpo = new THREE.Mesh(cuerpoGeo, cuerpoMat);
            cuerpo.rotation.x = Math.PI / 2;
            cuerpo.position.y = 0.2;
            grupo.add(cuerpo);

            const alaGeo = new THREE.ConeGeometry(0.5, 0.15, 5);
            const alaMat = new THREE.MeshStandardMaterial({ 
                color: 0xffaa33, 
                transparent: true, 
                opacity: 0.9,
                emissive: new THREE.Color(0x331100)
            });
            
            const alaIzq = new THREE.Mesh(alaGeo, alaMat);
            alaIzq.position.set(-0.4, 0.25, 0);
            alaIzq.rotation.y = 0.3;
            alaIzq.rotation.z = -0.2;
            alaIzq.scale.set(1.2, 0.3, 1);
            grupo.add(alaIzq);

            const alaDer = alaIzq.clone();
            alaDer.position.set(0.4, 0.25, 0);
            alaDer.rotation.y = -0.3;
            alaDer.rotation.z = 0.2;
            grupo.add(alaDer);

            grupo.position.set(posX, posY, posZ);
            return grupo;
        }

        const mariposas = [];
        for (let i = 0; i < 12; i++) {
            const angulo = Math.random() * Math.PI * 2;
            const radio = 3 + Math.random() * 6;
            const x = Math.cos(angulo) * radio;
            const z = Math.sin(angulo) * radio;
            const y = 1.5 + Math.random() * 4;
            const mariposa = crearMariposaVisible(x, y, z);
            scene.add(mariposa);
            mariposas.push(mariposa);
        }

        // --- ESTRELLAS ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 800; i++) {
            const r = 20 + Math.random() * 60;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPos.push(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            );
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.2 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- FRASES (rápidas) ---
        const frases = [
            "Eres la flor más hermosa",
            "Contigo es primavera siempre",
            "Tu amor ilumina mi vida",
            "Eres mi razón de sonreír",
            "Te amo infinito",
            "Juntos florecemos",
            "Eres mi sueño",
            "Mi persona favorita",
            "Te adoro",
            "Eres especial"
        ];
        
        let indiceFrase = 0;

        // Cambiar frase CADA 2 SEGUNDOS
        setInterval(() => {
            indiceFrase = (indiceFrase + 1) % frases.length;
            document.getElementById('message-text').textContent = `"${frases[indiceFrase]}"`;
        }, 2000); // ← CAMBIA ESTE NÚMERO (2000 = 2 segundos)

        // Efecto magia cada 8 segundos
        setInterval(() => {
            pointLights.forEach((light, index) => {
                setTimeout(() => {
                    light.intensity = 2.5;
                    light.color.setHSL(Math.random(), 1, 0.6);
                    setTimeout(() => {
                        light.intensity = 1.2;
                        light.color.setHSL(0.12, 1, 0.5);
                    }, 300);
                }, index * 50);
            });

            flores.forEach((flor, index) => {
                setTimeout(() => {
                    flor.scale.set(1.2, 1.2, 1.2);
                    setTimeout(() => {
                        flor.scale.set(1, 1, 1);
                    }, 300);
                }, index * 15);
            });
        }, 8000);

        // Countdown
        function actualizarCountdown() {
            const hoy = new Date();
            const marzo21 = new Date(hoy.getFullYear(), 2, 21);
            if (hoy > marzo21) marzo21.setFullYear(marzo21.getFullYear() + 1);
            
            const diff = marzo21 - hoy;
            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('countdown').innerHTML = 
                `${dias.toString().padStart(2,'0')}d ${horas.toString().padStart(2,'0')}h ${minutos.toString().padStart(2,'0')}m ${segundos.toString().padStart(2,'0')}s`;
        }

        setInterval(actualizarCountdown, 1000);
        actualizarCountdown();

        // Animación
        function animate() {
            requestAnimationFrame(animate);
            
            const t = performance.now() / 1000;

            stars.rotation.y += 0.0002;

            flores.forEach((flor, i) => {
                flor.rotation.y += 0.002;
                flor.position.y = Math.sin(t * 1.5 + i) * 0.2;
            });

            mariposas.forEach((mariposa, i) => {
                mariposa.position.y += Math.sin(t * 4 + i) * 0.01;
                mariposa.rotation.y += 0.02;
            });

            pointLights.forEach((light, i) => {
                light.position.x = Math.cos(t * 0.7 + i) * 5;
                light.position.z = Math.sin(t * 0.7 + i) * 5;
                light.position.y = 3 + Math.sin(t * 2 + i) * 1.5;
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
